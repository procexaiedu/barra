# OBS-02 — Alertmanager do stack barra (Elite Baby MVP).
# Roteamento minimo: todos os alertos das alert.rules.yml caem num unico receiver.
# O destino real (webhook do painel / e-mail) e PASSO DO OPERADOR — editar a url do
# webhook_configs abaixo (ou trocar pelo bloco email_configs) e recriar o Swarm config.
# OBS: o Alertmanager NAO expande variaveis de ambiente no config (nao existe a flag
# --config.expand-env); por isso a url fica literal aqui, nunca via ${ENV}.
global:
  resolve_timeout: 5m

route:
  # Agrupa por nome do alerta + dimensao p/ nao floodar (custo/latencia/seguranca).
  group_by: ["alertname", "dimensao"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: barra-default

receivers:
  - name: barra-default
    # Relay Alertmanager->WhatsApp: POST no endpoint da propria API (barra/api/alertas.py),
    # que formata e entrega no numero de DEV via Evolution. O token e SEGREDO e o Alertmanager
    # nao expande env no config -> este arquivo versionado (repo publico) leva o placeholder
    # TROCAR_PELO_TOKEN; o Swarm config real (barra_alertmanager_yml_vN) e criado a partir
    # daqui com o token substituido (mesmo valor de ALERTAS_WEBHOOK_TOKEN no Env do stack).
    webhook_configs:
      - url: "http://barra-api:8000/alertas/alertmanager?token=TROCAR_PELO_TOKEN"
        send_resolved: true
