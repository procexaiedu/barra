# OBS-02 — regras de alerta do agente (Elite Baby MVP).
# Cobrem os 4 sinais do DoD do OBS-02 + a regra do CUSTO-05 + o tripwire de regressao de
# seguranca (08c §2: vazamento cross-modelo, queda do eval online de non_disclosure, judge de
# AUP falhando) — sobre as metricas de guard que ja sao emitidas inline (ADR 0016 / EVAL-11).
# Nomes/labels de metrica espelham api/src/barra/core/metrics.py — NAO renomear sem alinhar la.
#   agente_escalada_total{bucket,motivo}            bucket=defesa|capacidade
#   agente_turno_tokens_total{modelo,tipo}          tipo=input|output|cache_read|cache_write
#   agente_turno_duracao_seconds{modelo,tipo_turno} Histogram (_bucket/_count/_sum)
#   agente_custo_turno_brl{modelo}                  Histogram (_bucket/_count/_sum)
#   barra_http_request_duration_seconds{route,method} Histogram (_bucket/_count/_sum)
#   agente_output_leak_total{motivo}                motivo=ia_self|system|cross_modelo
#   agente_aup_saida_bloqueado_total{resultado}     resultado=violou|judge_falhou
#   agente_eval_pass_rate{suite}                    Histogram (_count/_sum); 1.0=passou (EVAL-11)
groups:
  - name: agente_defesa
    rules:
      # OBS-02 sinal 1 — spike de escaladas de defesa = ataque ativo (jailbreak/disclosure/AUP).
      # bucket=defesa e o desejavel (a IA se protegeu); um SPIKE e o que sinaliza ataque em
      # andamento. capacidade fica de fora (cego a alucinacao-sem-escalada, ver metrics.py).
      - alert: AgenteSpikeEscaladaDefesa
        expr: sum(rate(agente_escalada_total{bucket="defesa"}[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
          dimensao: seguranca
        annotations:
          summary: "Spike de escaladas de defesa (possivel ataque ativo)"
          description: >
            rate(agente_escalada_total{bucket=defesa}) em {{ $value | printf "%.3f" }}/s nos
            ultimos 5m. Defesa em alta = jailbreak/disclosure/AUP batendo na IA. Investigar
            origem (conversa/cliente) nos traces.

      # Deriva LENTA de escaladas de capacidade (complemento do spike acima, que so pega ataque
      # em 5m): a fracao de turnos processados que termina em escalada de capacidade subindo ao
      # longo do dia = degradacao de conducao (cardapio incompleto, agenda apertada, regressao de
      # prompt) que nenhum alerta pegava. Denominador restrito aos turnos REALMENTE processados
      # (exclui sem_pendencia/ia_pausada_skip/lock_busy, que inflariam a base). Limiar 0.15 e
      # proposta inicial — tuning do operador pos-go-live.
      - alert: AgenteTaxaEscaladaCapacidadeAlta
        expr: |
          sum(increase(agente_escalada_total{bucket="capacidade"}[6h]))
          /
          sum(increase(agente_turno_resultado_total{resultado=~"ok|ok_sem_resposta|escalado|exaustao"}[6h]))
          > 0.15
        for: 1h
        labels:
          severity: warning
          dimensao: capacidade
        annotations:
          summary: "Taxa de escalada de capacidade acima de 15% dos turnos (deriva lenta)"
          description: >
            {{ $value | humanizePercentage }} dos turnos processados nas ultimas 6h terminaram em
            escalada de capacidade (fora_de_oferta/horario_indisponivel/...). Nao e ataque — e a
            IA reconhecendo limite demais: checar cardapio/agenda/regressao de prompt nos traces.

  - name: agente_output_guard
    rules:
      # 08c §2 — tripwire de REGRESSAO de isolamento (distinto do spike de ATAQUE acima): a IA
      # gerando dado de OUTRA modelo na saida. agente_output_leak_total conta o que a Etapa 1 do
      # output-guard BARROU; cross_modelo e o invariante #1 (isolamento por par), entao QUALQUER
      # ocorrencia em regime ja e sinal de regressao do prefixo/contexto — nao espera taxa.
      - alert: AgenteVazamentoCrossModelo
        expr: increase(agente_output_leak_total{motivo="cross_modelo"}[1h]) > 0
        for: 0m
        labels:
          severity: critical
          dimensao: seguranca
        annotations:
          summary: "Output-guard barrou vazamento cross-modelo (invariante #1)"
          description: >
            {{ $value | printf "%.0f" }} bolha(s) com dado de OUTRA modelo barradas na ultima
            hora. O guard protegeu, mas a IA NAO deveria gerar isso — regressao do isolamento por
            par (CONTEXT.md "IA por modelo"). Investigar a conversa/modelo nos logs.

      # 08c §2 — queda de QUALQUER rubrica do eval online (EVAL-11). agente_eval_pass_rate
      # amostra ~5% dos turnos 'ok' (1 sorteio, 4 suites: online_non_disclosure,
      # online_system_leak, online_segredo_agenda, online_formato_bolha — coordenador.py) e grava
      # 1.0=passou / 0.0=falhou. A media por suite = pass-rate vivo; < 0.95 dispara COM o label
      # `suite` apontando a rubrica. Sem amostra na janela, 0/0 -> serie ausente, nao dispara
      # (nao alarme de silencio).
      - alert: AgenteEvalOnlineCaiu
        expr: |
          sum by (suite) (rate(agente_eval_pass_rate_sum[1h]))
          /
          sum by (suite) (rate(agente_eval_pass_rate_count[1h]))
          < 0.95
        for: 30m
        labels:
          severity: warning
          dimensao: seguranca
        annotations:
          summary: "Pass-rate do eval online abaixo de 0.95 (suite {{ $labels.suite }})"
          description: >
            media de agente_eval_pass_rate{suite={{ $labels.suite }}} = {{ $value | printf
            "%.2f" }} na ultima 1h (amostra ~5% dos turnos 'ok'). non_disclosure/system_leak/
            segredo_agenda = vazamento chegando ao cliente sem o guard barrar; formato_bolha =
            regressao de chunking/template. Confirmar no runner offline (gate de verdade) e logs.

      # Complemento RAPIDO do alerta acima (multi-window). O <0.95/30m pega EROSAO lenta; um CRATER
      # subito (pass-rate desabando em minutos = regressao de prompt recem-deployada, provider
      # trocado, prefixo quebrado) precisa de janela curta + limiar mais fundo + severity critical.
      # Burn-rate multi-window classico (14.4x) e calibrado p/ SLO de disponibilidade alta (99.9%);
      # sobre um objetivo de QUALIDADE de 0.95 o 14.4x viraria limiar absurdo (>0.72 de falha),
      # entao usamos a IDEIA multi-window (rapido+profundo vs lento+raso) calibrada ao objetivo
      # real: <0.85 em 10m. Sem amostra na janela, 0/0 -> serie ausente, nao dispara (nao alarme
      # de silencio), igual ao alerta de erosao.
      - alert: AgenteEvalOnlineDespencou
        expr: |
          sum by (suite) (rate(agente_eval_pass_rate_sum[10m]))
          /
          sum by (suite) (rate(agente_eval_pass_rate_count[10m]))
          < 0.85
        for: 10m
        labels:
          severity: critical
          dimensao: seguranca
        annotations:
          summary: "Pass-rate do eval online DESPENCOU abaixo de 0.85 (suite {{ $labels.suite }})"
          description: >
            media de agente_eval_pass_rate{suite={{ $labels.suite }}} = {{ $value | printf
            "%.2f" }} nos ultimos 10m — queda RAPIDA (vs o <0.95/30m de erosao lenta). Suspeitar de
            deploy recente de prompt / provider trocado / prefixo quebrado: confirmar no runner
            offline (gate de verdade) e considerar rollback.

      # Disponibilidade da Etapa 2 do guard: judge de AUP falhando por infra -> default seguro
      # bloqueia+escala, mas a checagem de AUP de saida fica CEGA e a IA fica muda demais. Spike
      # sustentado = judge/credito/rede degradado — distinto de viola real (resultado=violou).
      - alert: AgenteAupSaidaJudgeFalhando
        expr: sum(rate(agente_aup_saida_bloqueado_total{resultado="judge_falhou"}[15m])) > 0.02
        for: 15m
        labels:
          severity: warning
          dimensao: seguranca
        annotations:
          summary: "Judge de AUP do output-guard falhando (Etapa 2 cega, bloqueios default-safe)"
          description: >
            rate(agente_aup_saida_bloqueado_total{resultado=judge_falhou}) = {{ $value | printf
            "%.3f" }}/s nos ultimos 15m. A Etapa 2 esta caindo p/ default seguro (bloqueia+escala)
            — checar credito/infra do judge (memoria "Anthropic creditos esgotados").

  - name: agente_custo
    rules:
      # CUSTO-05 — WRITE-RATE de cache. Invariante de agente/CLAUDE.md: write-rate alto
      # pos-warmup = invalidador silencioso do prefixo cacheado (o prefixo deveria ser
      # cache_read, nao reescrito a cada turno). cache_write / input > 15% em regime dispara.
      # `input` JA E o total de tokens de input (langchain-anthropic 1.4.3 reporta input_tokens
      # incluindo cache_read + cache_creation — ver _custo.input_nao_cacheado / runner._cache_hit_rate);
      # somar cache_read/cache_write por cima dobrava a parcela cacheada no denominador e subestimava
      # o write-rate. Usa rate() p/ olhar o fluxo recente, nao o acumulado historico.
      - alert: AgenteCacheWriteRateAlto
        expr: |
          sum(rate(agente_turno_tokens_total{tipo="cache_write"}[15m]))
          /
          sum(rate(agente_turno_tokens_total{tipo="input"}[15m]))
          > 0.15
        for: 15m
        labels:
          severity: warning
          dimensao: custo
        annotations:
          summary: "Write-rate de cache acima de 15% (invalidador silencioso do prefixo)"
          description: >
            cache_write representa {{ $value | humanizePercentage }} dos tokens de input em
            regime. Pos-warmup o prefixo deveria ser cache_read; write alto = algo reescreve o
            prefixo a cada turno (ver invariante em agente/CLAUDE.md / 03 §4.2).

      # OBS-02 sinal 4 — custo por turno acima do alvo. p95 do Histogram de custo em BRL.
      # alinhar com settings.custo_alvo_brl (CUSTO-06) — entregue em paralelo na feat/custo-roi;
      # ate o merge usa-se o literal 0.12 (= meta documentada em metrics.py AGENTE_CUSTO_TURNO_BRL).
      - alert: AgenteCustoTurnoAcimaDoAlvo
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(agente_custo_turno_brl_bucket[30m])) by (le)
          ) > 0.12
        for: 15m
        labels:
          severity: warning
          dimensao: custo
        annotations:
          summary: "p95 do custo por turno acima do alvo (0.12 BRL)"
          description: >
            p95(agente_custo_turno_brl) = R$ {{ $value | printf "%.4f" }} nos ultimos 30m,
            acima do alvo de R$ 0.12 (alinhar com settings.custo_alvo_brl — CUSTO-06).

  - name: agente_latencia
    rules:
      # OBS-02 sinal 3 — p95 de latencia do turno do agente (split por tipo_turno p/ nao
      # misturar texto com audio-Whisper). Histogram -> histogram_quantile sobre o _bucket.
      - alert: AgenteLatenciaTurnoP95Alta
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(agente_turno_duracao_seconds_bucket[10m])) by (le, tipo_turno)
          ) > 20
        for: 10m
        labels:
          severity: warning
          dimensao: latencia
        annotations:
          summary: "p95 de latencia do turno do agente acima de 20s"
          description: >
            p95(agente_turno_duracao_seconds{tipo_turno={{ $labels.tipo_turno }}}) =
            {{ $value | printf "%.1f" }}s nos ultimos 10m.

      # Cauda (p99) do turno — complemento do p95 acima. O p95 mascara o pior 5% (timeouts perto
      # dos 60s por ainvoke, audio-Whisper lento, drain longo); o p99 pega a deriva de CAUDA que
      # degrada a experiencia de uma minoria antes de mover o p95. Limiar 40s = proposta inicial
      # (~2x o p95, abaixo do teto de 60s do asyncio.wait_for) — tuning do operador pos-go-live.
      - alert: AgenteLatenciaTurnoP99Alta
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(agente_turno_duracao_seconds_bucket[10m])) by (le, tipo_turno)
          ) > 40
        for: 10m
        labels:
          severity: warning
          dimensao: latencia
        annotations:
          summary: "p99 de latencia do turno do agente acima de 40s (deriva de cauda)"
          description: >
            p99(agente_turno_duracao_seconds{tipo_turno={{ $labels.tipo_turno }}}) =
            {{ $value | printf "%.1f" }}s nos ultimos 10m. Cauda perto do teto de 60s por
            iteracao — checar drain longo / round-trips llm<->tools / provider lento nos traces.

      # OBS-02 sinal 3 (complemento HTTP) — p95 de latencia da API por rota.
      - alert: BarraHttpLatenciaP95Alta
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(barra_http_request_duration_seconds_bucket[10m])) by (le, route)
          ) > 2
        for: 10m
        labels:
          severity: warning
          dimensao: latencia
        annotations:
          summary: "p95 de latencia HTTP acima de 2s"
          description: >
            p95(barra_http_request_duration_seconds{route={{ $labels.route }}}) =
            {{ $value | printf "%.2f" }}s nos ultimos 10m.

  - name: piloto_rollback
    rules:
      # Producao assistida — gatilhos objetivos de rollback do piloto (workers/rollback_watch.py).
      # O cron diario avalia a janela de 7d e seta o gauge (1=disparado); o alerta transporta o
      # veredito ate o canal dev (WhatsApp via relay). A pausa da modelo e DECISAO HUMANA — este
      # alerta nunca desliga nada. repeat_interval do Alertmanager (4h) re-lembra enquanto ativo.
      - alert: PilotoGatilhoRollback
        expr: barra_rollback_gatilho == 1
        for: 1m
        labels:
          severity: critical
          dimensao: piloto
        annotations:
          summary: "Gatilho de rollback do piloto disparado: {{ $labels.gatilho }}"
          description: >
            O vigia diario marcou o gatilho {{ $labels.gatilho }} na janela de 7 dias.
            Ver o log ERROR ROLLBACK_GATILHO no barra-worker e o plano de producao
            assistida; avaliar pausa do piloto (status da modelo) — decisao humana.

      # O gauge acima e IN-PROCESS: some a cada force-update do barra-worker (todo deploy de
      # prompt) e so e re-armado no boot + no cron das 05:00. Sem serie, um alerta que estava
      # firing "resolve" sozinho — por isso o worker re-avalia os gatilhos no startup.

  - name: piloto_supervisao_viva
    rules:
      # Os gatilhos do piloto so valem se a cadeia que os produz estiver viva. Estas 3 regras
      # vigiam a PROPRIA supervisao: silencio aqui e indistinguivel de "tudo ok".
      - alert: BarraServicoSemMetricas
        expr: up{job=~"barra-.*"} == 0
        for: 5m
        labels:
          severity: critical
          dimensao: piloto
        annotations:
          summary: "Prometheus nao raspa {{ $labels.job }} ha 5m"
          description: >
            Sem scrape de {{ $labels.job }}, TODOS os gatilhos do piloto ficam cegos.
            LIMITACAO CONHECIDA: o relay de alerta entrega via barra-api — se o job caido
            for o proprio barra-api, este alerta nao se auto-entrega (cobre worker e
            tracing). API muda exige checagem externa (Traefik/Portainer).
      - alert: TracingLangfuseDesligado
        expr: barra_tracing_langfuse_ligado == 0
        for: 10m
        labels:
          severity: warning
          dimensao: piloto
        annotations:
          summary: "Tracing Langfuse desligado no processo"
          description: >
            O agente esta rodando cego (sem trace do turno). Cenario tipico: redeploy git
            que zerou o Env do stack. LANGFUSE_OBRIGATORIO=true derruba o BOOT, mas nao
            cobre o Langfuse caindo com o processo ja de pe — que e o que esta regra pega.
      - alert: JudgePosEnvioDegradado
        expr: sum(rate(agente_judge_pos_envio_total{resultado="indisponivel"}[30m])) > 0
        for: 30m
        labels:
          severity: warning
          dimensao: piloto
        annotations:
          summary: "Judge pos-envio indisponivel de forma sustentada"
          description: >
            Judge sem veredito por 30m seguidos: a telemetria do piloto esta perdendo turnos.
            Efeito nos gatilhos — `nao_contidos` deflaciona EM SILENCIO (direcao perigosa) e
            a `taxa_gate` perde denominador. Checar credito/estabilidade do DeepSeek antes de
            ler qualquer numero do rollback_watch.
