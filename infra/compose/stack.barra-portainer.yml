# BARRA VIPS — Docker Compose para Portainer (Swarm), git-backed (GitOps).
#
# FONTE ÚNICA DE VERDADE da stack de produção `barra-vips`. O Portainer puxa este
# arquivo do repo (branch main, path infra/compose/stack.barra-portainer.yml) e
# redeploya via webhook. Ver ADR 0018 e infra/runbooks/stack-git-backed.md.
#
# SEGREDOS NÃO FICAM AQUI. Valores sensíveis são placeholders `${VAR}` resolvidos
# pelas Env vars do stack no Portainer (fora do git); a chave do MinIO vem de um
# Swarm secret (`minio_secret_key`, external) via MINIO_SECRET_KEY_FILE.
# Config não-sensível (CORS, JIDs, modelos, flags) é versionada aqui de propósito:
# é o que impede a "evaporação" de config em redeploys manuais.
version: '3.8'

services:
  barra-api:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app
    environment:
      - AMBIENTE=producao
      - LOG_LEVEL=INFO
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=https://db.procexai.tech
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis-barra:6379
      - MINIO_ENDPOINT=https://minioback.procexai.tech/
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      # MINIO_SECRET_KEY vem do Swarm secret (settings.py lê MINIO_SECRET_KEY_FILE).
      - MINIO_SECRET_KEY_FILE=/run/secrets/minio_secret_key
      - MINIO_BUCKET_MEDIA=barra-media
      - MINIO_USE_SSL=true
      # Os 3 caminhos de TEXTO (chat #1, extracao #2, judge #3) sao DeepSeek V4 Flash DIRETO
      # (api.deepseek.com): cache automatico de prefixo garantido + modelo cravado. DEEPSEEK_API_KEY
      # e ${VAR} do Env do stack (segredo, fora do git). DEEPSEEK_MODEL_CHAT=deepseek-v4-flash = id
      # atual do V4 Flash (aliases legados deepseek-chat/deepseek-reasoner saem em 2026-07-24 15:59
      # UTC); o id cru tem thinking ON por default -> criar_chat_deepseek trava non-thinking via extra_body.
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL_CHAT=deepseek-v4-flash
      - LLM_VISION_PROVIDER=openrouter
      - LLM_AUDIO_PROVIDER=openrouter
      # OpenRouter (vision do Pix / transcricao de audio — o DeepSeek nao faz imagem/audio): ${VAR}
      # resolvidas pelo Env do stack no Portainer. Hardcoded vazio aqui zerava o OCR a cada redeploy
      # (auto-redeploy git no push), caindo todo Pix em em_revisao.
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL_VISION_PIX=${OPENROUTER_MODEL_VISION_PIX}
      - OPENROUTER_MODEL_AUDIO_TRANSCRIBE=${OPENROUTER_MODEL_AUDIO_TRANSCRIBE}
      # Observabilidade: Langfuse self-hosted (ADR 0019). LANGCHAIN_TRACING_V2=false e
      # OBRIGATORIO -- sem setup_tracing (removido no cutover Fase 3) o LangChain auto-tracaria
      # pro LangSmith com o client default SEM anonymizer (PII crua). LANGCHAIN_* ficam mortos
      # ate a Fase 4 (LangSmith aposentado). LANGFUSE_HOST nao e segredo (versionado); as chaves
      # PUBLIC/SECRET sao ${VAR} resolvidas pelo Env do stack no Portainer.
      - LANGCHAIN_TRACING_V2=false
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=barra-vips-prod
      - LANGFUSE_HOST=https://langfuse.procexai.tech
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      # Trava de boot da observabilidade (piloto de producao assistida): tracing nao subiu
      # (chave ausente/auth falhou) -> RuntimeError no startup, deploy falha na hora em vez
      # de rodar cego. Cenario real: redeploy git sem Env zera LANGFUSE_PUBLIC/SECRET_KEY.
      - LANGFUSE_OBRIGATORIO=true
      - EVOLUTION_BASE_URL=https://evogo.procexai.tech
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCIA=elitebaby01
      # elitebaby01 é instância DEDICADA (não compartilhada como a procex-teste do piloto
      # anterior) — pode receber webhook direto, sem indireção de router. EVOLUTION_WEBHOOK_TOKEN
      # é escolhido por nós (não mais o token que um router anexaria), DISTINTO da
      # EVOLUTION_API_KEY (que na EvoGo é a GLOBAL_API_KEY, cria/deleta instâncias).
      - EVOLUTION_WEBHOOK_TOKEN=${EVOLUTION_WEBHOOK_TOKEN}
      # Callback direto: definir_webhook/_connect grava webhookUrl+subscribe no /instance/connect
      # da elitebaby01 nesse endereço (token embutido em ?token= por _webhook_url). Diferente da
      # procex-teste (compartilhada, callback vazio de propósito) — aqui é seguro reescrever o
      # webhook porque a instância só serve este projeto.
      - EVOLUTION_WEBHOOK_CALLBACK_URL=https://api-barra.procexai.tech/webhook/evolution
      # Host do MinIO da EvoGo (mídia inbound WEBHOOK_FILES vem de host distinto do base_url) —
      # liberado no anti-SSRF do download de mídia.
      - 'EVOLUTION_MEDIA_HOSTS=["minioback.procexai.tech"]'
      - EVOLUTION_GRUPO_COORDENACAO_JID=120363407815206369@g.us
      - EVOLUTION_FERNANDO_JIDS=[]
      # Ingestão automática do rig de feedback (#93). Grupo "ProceX - Feedbacks EliteBaby" da lucia.
      # JID (não é segredo, como o de coordenação acima). Desligar a captura = remover esta linha.
      - FEEDBACK_RIG_GRUPO_JID=120363426757729499@g.us
      # ACK de registro: a lucia responde "anotei aqui" citando o feedback (debounce ~2 min). Só
      # arma p/ mensagem com substância; não persiste em envios_evolution.
      - FEEDBACK_RIG_ACK=true
      # Secret HMAC do webhook do GitHub (/webhook/github) p/ o aviso de "desenvolvido" no fecho da
      # issue. VALOR fica no Env do stack (Portainer), não aqui. Vazio = webhook desligado (seguro).
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - 'CORS_ORIGINS=["https://elitebaby.procexai.tech","https://barravips.procexai.tech","https://barra-nine.vercel.app","https://barra-procexais-projects.vercel.app","https://barra-git-main-procexais-projects.vercel.app","https://barra-vips.vercel.app"]'
      - 'CORS_ORIGIN_REGEX=https://([a-z0-9-]+\.)*procexai\.tech|https://barra[a-z0-9-]*\.vercel\.app'
      # Allowlist de TESTE da Fase 1.5 DESLIGADA (21/07) — elitebaby01 passa a atender qualquer
      # cliente real do anúncio-teste. A lucia (Tatiane teste, outros projetos usam esse número)
      # segue pausada (status='pausada') via o kill-switch oficial do domínio — não depende mais
      # desta allowlist pra ficar muda.
      - 'JID_PERMITIDO=[]'
      # Comando de TESTE `#reset` no grupo cliente-teste: zera o estado da modelo p/
      # recomeçar do zero. Só a instância de teste `lucia` — nunca uma modelo real.
      - 'RESET_TESTE_INSTANCES=["lucia"]'
      - SENTRY_DSN=
      # Mapeia email do operador logado -> rotulador na tela /calibracao (Loop B / EVAL-10).
      # Emails (nao-secreto); sem eles a tela responde 403 "nao configurado como rotulador".
      # 'procex' e um 3o revisor independente (fora do golden fernando x socia).
      - CALIBRACAO_EMAIL_FERNANDO=fernando@procexai.tech
      - CALIBRACAO_EMAIL_SOCIA=elitebaby@procexai.tech
      - CALIBRACAO_EMAIL_PROCEX=contato@procexai.tech
      # Relay Alertmanager->WhatsApp (canal dev de alertas): token do endpoint e numero de
      # destino sao segredo/dado pessoal -> ${VAR} do Env do stack (repo publico, nada aqui).
      - ALERTAS_WEBHOOK_TOKEN=${ALERTAS_WEBHOOK_TOKEN}
      - ALERTAS_WHATSAPP_JID=${ALERTAS_WHATSAPP_JID}
    command: >
      sh -c "apt-get update && apt-get install -y --no-install-recommends git ca-certificates &&
      rm -rf /app/repo &&
      git clone -b main https://${GITHUB_PAT}@github.com/procexaiedu/barra.git /app/repo &&
      cd /app/repo/api &&
      uv sync --frozen --no-dev &&
      uv run uvicorn barra.main:app --host 0.0.0.0 --port 8000"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.barra-api.rule=Host(`api-barra.procexai.tech`)"
        - "traefik.http.routers.barra-api.entrypoints=websecure"
        - "traefik.http.routers.barra-api.tls=true"
        - "traefik.http.routers.barra-api.tls.certresolver=le"
        - "traefik.http.services.barra-api.loadbalancer.server.port=8000"
        - "traefik.docker.network=traefik_public"
    depends_on:
      - redis-barra
    networks:
      - traefik_public
      - supabase_default
    secrets:
      - minio_secret_key

  barra-worker:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app
    environment:
      - AMBIENTE=producao
      - LOG_LEVEL=INFO
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=https://db.procexai.tech
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis-barra:6379
      - MINIO_ENDPOINT=minioback.procexai.tech
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY_FILE=/run/secrets/minio_secret_key
      - MINIO_BUCKET_MEDIA=barra-media
      - MINIO_USE_SSL=true
      # Os 3 caminhos de TEXTO (chat #1, extracao #2, judge #3) sao DeepSeek V4 Flash DIRETO
      # (api.deepseek.com): cache automatico de prefixo garantido + modelo cravado. DEEPSEEK_API_KEY
      # e ${VAR} do Env do stack (segredo, fora do git). DEEPSEEK_MODEL_CHAT=deepseek-v4-flash = id
      # atual do V4 Flash (aliases legados deepseek-chat/deepseek-reasoner saem em 2026-07-24 15:59
      # UTC); o id cru tem thinking ON por default -> criar_chat_deepseek trava non-thinking via extra_body.
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL_CHAT=deepseek-v4-flash
      - LLM_VISION_PROVIDER=openrouter
      - LLM_AUDIO_PROVIDER=openrouter
      # OpenRouter (vision do Pix / transcricao de audio — o DeepSeek nao faz imagem/audio): ${VAR}
      # resolvidas pelo Env do stack no Portainer. Hardcoded vazio aqui zerava o OCR a cada redeploy
      # (auto-redeploy git no push), caindo todo Pix em em_revisao.
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL_VISION_PIX=${OPENROUTER_MODEL_VISION_PIX}
      - OPENROUTER_MODEL_AUDIO_TRANSCRIBE=${OPENROUTER_MODEL_AUDIO_TRANSCRIBE}
      # Observabilidade: Langfuse self-hosted (ADR 0019). LANGCHAIN_TRACING_V2=false e
      # OBRIGATORIO -- sem setup_tracing (removido no cutover Fase 3) o LangChain auto-tracaria
      # pro LangSmith com o client default SEM anonymizer (PII crua). LANGCHAIN_* ficam mortos
      # ate a Fase 4 (LangSmith aposentado). LANGFUSE_HOST nao e segredo (versionado); as chaves
      # PUBLIC/SECRET sao ${VAR} resolvidas pelo Env do stack no Portainer.
      - LANGCHAIN_TRACING_V2=false
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=barra-vips-prod
      - LANGFUSE_HOST=https://langfuse.procexai.tech
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      # Trava de boot da observabilidade (piloto de producao assistida): tracing nao subiu
      # (chave ausente/auth falhou) -> RuntimeError no startup, deploy falha na hora em vez
      # de rodar cego. Cenario real: redeploy git sem Env zera LANGFUSE_PUBLIC/SECRET_KEY.
      - LANGFUSE_OBRIGATORIO=true
      - EVOLUTION_BASE_URL=https://evogo.procexai.tech
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCIA=elitebaby01
      # elitebaby01 é instância DEDICADA (não compartilhada como a procex-teste do piloto
      # anterior) — pode receber webhook direto, sem indireção de router. EVOLUTION_WEBHOOK_TOKEN
      # é escolhido por nós (não mais o token que um router anexaria), DISTINTO da
      # EVOLUTION_API_KEY (que na EvoGo é a GLOBAL_API_KEY, cria/deleta instâncias).
      - EVOLUTION_WEBHOOK_TOKEN=${EVOLUTION_WEBHOOK_TOKEN}
      # Callback direto: definir_webhook/_connect grava webhookUrl+subscribe no /instance/connect
      # da elitebaby01 nesse endereço (token embutido em ?token= por _webhook_url). Diferente da
      # procex-teste (compartilhada, callback vazio de propósito) — aqui é seguro reescrever o
      # webhook porque a instância só serve este projeto.
      - EVOLUTION_WEBHOOK_CALLBACK_URL=https://api-barra.procexai.tech/webhook/evolution
      # Host do MinIO da EvoGo (mídia inbound WEBHOOK_FILES vem de host distinto do base_url) —
      # liberado no anti-SSRF do download de mídia.
      - 'EVOLUTION_MEDIA_HOSTS=["minioback.procexai.tech"]'
      - EVOLUTION_GRUPO_COORDENACAO_JID=120363407815206369@g.us
      - EVOLUTION_FERNANDO_JIDS=[]
      # Ingestão automática do rig de feedback (#93). Grupo "ProceX - Feedbacks EliteBaby" da lucia.
      # JID (não é segredo, como o de coordenação acima). Desligar a captura = remover esta linha.
      - FEEDBACK_RIG_GRUPO_JID=120363426757729499@g.us
      # ACK de registro (o job roda no worker; lê este gate). Ver serviço da API.
      - FEEDBACK_RIG_ACK=true
      # Allowlist de TESTE da Fase 1.5 DESLIGADA (21/07) — ver serviço da API pro motivo.
      - 'JID_PERMITIDO=[]'
      - SENTRY_DSN=
    command: >
      sh -c "apt-get update && apt-get install -y --no-install-recommends git ca-certificates &&
      rm -rf /app/repo &&
      git clone -b main https://${GITHUB_PAT}@github.com/procexaiedu/barra.git /app/repo &&
      cd /app/repo/api &&
      uv sync --frozen --no-dev &&
      uv run arq barra.workers.settings.WorkerSettings"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    depends_on:
      - redis-barra
    networks:
      - traefik_public
      - supabase_default
    secrets:
      - minio_secret_key

  redis-barra:
    image: redis:7.0-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
      - redis-barra-data:/data
    networks:
      - traefik_public

  prometheus-barra:
    image: prom/prometheus:v2.53.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    configs:
      - source: barra_prometheus_yml_v1
        target: /etc/prometheus/prometheus.yml
      - source: barra_alert_rules_yml_v4
        target: /etc/prometheus/alert.rules.yml
    volumes:
      - prometheus-barra-data:/prometheus
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - traefik_public

  alertmanager-barra:
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    configs:
      - source: barra_alertmanager_yml_v3
        target: /etc/alertmanager/alertmanager.yml
    volumes:
      - alertmanager-barra-data:/alertmanager
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - traefik_public

  grafana-barra:
    image: grafana/grafana:11.1.0
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://grafana-barra.procexai.tech
    configs:
      - source: barra_grafana_ds_yml_v1
        target: /etc/grafana/provisioning/datasources/prometheus.yml
    volumes:
      - grafana-barra-data:/var/lib/grafana
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.grafana-barra.rule=Host(`grafana-barra.procexai.tech`)"
        - "traefik.http.routers.grafana-barra.entrypoints=websecure"
        - "traefik.http.routers.grafana-barra.tls=true"
        - "traefik.http.routers.grafana-barra.tls.certresolver=le"
        - "traefik.http.services.grafana-barra.loadbalancer.server.port=3000"
        - "traefik.docker.network=traefik_public"
    networks:
      - traefik_public

  # Interface (painel Next.js) — migrada da Vercel para a stack (ver
  # infra/runbooks/interface-portainer.md). Mesmo padrão git-clone-no-boot de
  # api/worker (ADR 0018): imagem node base, clona o main, instala e builda no
  # boot. Sem imagem versionada por ora — o cutover para GHCR é o DEPLOY-03,
  # compartilhado com api/worker (billing dos Actions pendente).
  #
  # As NEXT_PUBLIC_* são embutidas no bundle do browser NO `next build`, então
  # precisam estar no environment ANTES do build (é por isso que ficam aqui, e
  # não injetadas em runtime como na api). API_URL e SUPABASE_URL são config
  # não-sensível e ficam versionadas de propósito; as chaves (ANON_KEY, Google
  # Maps) são ${VAR} resolvidas pelo Env do stack no Portainer — os valores vêm
  # da aba Environment Variables (scope Production) da Vercel.
  barra-interface:
    image: node:22-bookworm-slim
    working_dir: /app
    environment:
      - NEXT_PUBLIC_API_URL=https://api-barra.procexai.tech
      - NEXT_PUBLIC_SUPABASE_URL=https://db.procexai.tech
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
      - NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID=${NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID}
      - PORT=3000
    command: >
      sh -c "apt-get update && apt-get install -y --no-install-recommends git ca-certificates &&
      npm install -g pnpm@10 &&
      rm -rf /app/repo &&
      git clone -b main https://${GITHUB_PAT}@github.com/procexaiedu/barra.git /app/repo &&
      cd /app/repo/interface &&
      pnpm install --frozen-lockfile --prod=false &&
      pnpm build &&
      pnpm start"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.barra-interface.rule=Host(`elitebaby.procexai.tech`)"
        - "traefik.http.routers.barra-interface.entrypoints=websecure"
        - "traefik.http.routers.barra-interface.tls=true"
        - "traefik.http.routers.barra-interface.tls.certresolver=le"
        - "traefik.http.services.barra-interface.loadbalancer.server.port=3000"
        - "traefik.docker.network=traefik_public"
    networks:
      - traefik_public

volumes:
  redis-barra-data:
  prometheus-barra-data:
  alertmanager-barra-data:
  grafana-barra-data:

configs:
  barra_prometheus_yml_v1:
    external: true
  barra_alert_rules_yml_v4:
    external: true
  barra_alertmanager_yml_v3:
    external: true
  barra_grafana_ds_yml_v1:
    external: true

networks:
  traefik_public:
    external: true
  supabase_default:
    external: true

secrets:
  # Criado pelo operador, fora do git (ver infra/runbooks/stack-git-backed.md):
  #   printf '%s' '<chave-minio>' | docker secret create minio_secret_key -
  minio_secret_key:
    external: true
