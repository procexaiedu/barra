# BARRA VIPS - Docker Compose para Portainer
version: '3.8'

services:
  barra-api:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app
    environment:
      - AMBIENTE=producao
      - LOG_LEVEL=INFO
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=https://zinrqzsxvpqfoogohrwg.supabase.co
      - SUPABASE_ANON_KEY=sb_publishable_Wnf-V2dnSmpEhx5QTXtxNw_SH6BT0M_
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis-barra:6379
      # Apenas host ou host:porta — sem https:// e sem path (SDK MinIO)
      - MINIO_ENDPOINT=https://minioback.procexai.tech/
      - MINIO_ACCESS_KEY=
      - MINIO_SECRET_KEY=
      - MINIO_BUCKET_MEDIA=barra-media
      - MINIO_USE_SSL=true
      - LLM_CHAT_PROVIDER=openrouter
      - LLM_VISION_PROVIDER=openrouter
      - LLM_AUDIO_PROVIDER=openrouter
      - OPENROUTER_API_KEY=
      - OPENROUTER_MODEL_CHAT=
      - OPENROUTER_MODEL_VISION_PIX=
      - OPENROUTER_MODEL_AUDIO_TRANSCRIBE=
      - ANTHROPIC_API_KEY=
      - ANTHROPIC_MODELO_PRINCIPAL=claude-sonnet-4-6
      - LANGCHAIN_TRACING_V2=true
      - LANGCHAIN_API_KEY=
      - LANGCHAIN_PROJECT=barra-vips-prod
      - EVOLUTION_BASE_URL=https://evolution3.procexai.tech
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_WEBHOOK_TOKEN=${EVOLUTION_WEBHOOK_TOKEN}
      - EVOLUTION_WEBHOOK_CALLBACK_URL=https://api-barra.procexai.tech/webhook/evolution
      - EVOLUTION_GRUPO_COORDENACAO_JID=120363423572479616@g.us
      - EVOLUTION_FERNANDO_JIDS=[]
      - 'CORS_ORIGINS=["https://elitebaby.procexai.tech","https://barravips.procexai.tech","https://barra-vips.vercel.app"]'
      - JID_PERMITIDO=120363423572479616@g.us
      - SENTRY_DSN=
    command: >
      sh -c "apt-get update && apt-get install -y --no-install-recommends git ca-certificates &&
      rm -rf /app/repo &&
      git clone -b main https://${GITHUB_PAT}@github.com/procexaiedu/barra.git /app/repo &&
      cd /app/repo/api &&
      uv sync --frozen --no-dev &&
      uv run uvicorn barra.main:app --host 0.0.0.0 --port 8000"
    # DEPLOY-03: drena conexoes em voo no shutdown antes do SIGKILL (pareia com o start-first).
    stop_grace_period: 30s
    # DEPLOY-02: readiness gate. A imagem uv:slim nao tem curl/wget — usa o python da propria
    # imagem p/ bater /ready (2xx quando o app subiu; nao-2xx enquanto clona/uv sync ou se o DB
    # cai). start_period cobre apt-get+git clone+uv sync p/ o Traefik nao rotear cedo demais.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=3)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    deploy:
      replicas: 1
      # DEPLOY-03: api start-first — sobe a task nova e saudavel antes de derrubar a velha
      # (sem 502; pareia com o readiness/healthcheck do DEPLOY-02). failure_action so reverte
      # se a task nova falhar dentro do monitor (o healthcheck marca a task unhealthy).
      update_config:
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        order: start-first
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.barra-api.rule=Host(`api-barra.procexai.tech`)"
        - "traefik.http.routers.barra-api.entrypoints=websecure"
        - "traefik.http.routers.barra-api.tls=true"
        - "traefik.http.routers.barra-api.tls.certresolver=le"
        - "traefik.http.services.barra-api.loadbalancer.server.port=8000"
        # DEPLOY-02: Traefik so roteia p/ a replica quando /ready responde 2xx (tira do pool
        # durante o uv sync e quando o backend degrada).
        - "traefik.http.services.barra-api.loadbalancer.healthcheck.path=/ready"
        - "traefik.http.services.barra-api.loadbalancer.healthcheck.interval=10s"
        - "traefik.docker.network=traefik_public"
    depends_on:
      - redis-barra
    networks:
      - traefik_public

  barra-worker:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app
    environment:
      - AMBIENTE=producao
      - LOG_LEVEL=INFO
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=https://zinrqzsxvpqfoogohrwg.supabase.co
      - SUPABASE_ANON_KEY=sb_publishable_Wnf-V2dnSmpEhx5QTXtxNw_SH6BT0M_
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis-barra:6379
      # Apenas host ou host:porta — sem https:// e sem path (SDK MinIO)
      - MINIO_ENDPOINT=minioback.procexai.tech
      - MINIO_ACCESS_KEY=
      - MINIO_SECRET_KEY=
      - MINIO_BUCKET_MEDIA=barra-media
      - MINIO_USE_SSL=true
      - LLM_CHAT_PROVIDER=openrouter
      - LLM_VISION_PROVIDER=openrouter
      - LLM_AUDIO_PROVIDER=openrouter
      - OPENROUTER_API_KEY=
      - OPENROUTER_MODEL_CHAT=
      - OPENROUTER_MODEL_VISION_PIX=
      - OPENROUTER_MODEL_AUDIO_TRANSCRIBE=
      - ANTHROPIC_API_KEY=
      - ANTHROPIC_MODELO_PRINCIPAL=claude-sonnet-4-6
      - LANGCHAIN_TRACING_V2=true
      - LANGCHAIN_API_KEY=
      - LANGCHAIN_PROJECT=barra-vips-prod
      - EVOLUTION_BASE_URL=https://evolution3.procexai.tech
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_WEBHOOK_TOKEN=${EVOLUTION_WEBHOOK_TOKEN}
      - EVOLUTION_WEBHOOK_CALLBACK_URL=https://api-barra.procexai.tech/webhook/evolution
      - EVOLUTION_GRUPO_COORDENACAO_JID=120363423572479616@g.us
      - EVOLUTION_FERNANDO_JIDS=[]
      - JID_PERMITIDO=120363423572479616@g.us
      - SENTRY_DSN=
    command: >
      sh -c "apt-get update && apt-get install -y --no-install-recommends git ca-certificates &&
      rm -rf /app/repo &&
      git clone -b main https://${GITHUB_PAT}@github.com/procexaiedu/barra.git /app/repo &&
      cd /app/repo/api &&
      uv sync --frozen --no-dev &&
      uv run arq barra.workers.settings.WorkerSettings"
    # DEPLOY-03: da ao ARQ ate 30s p/ terminar o job em voo antes do SIGKILL (pareia com stop-first).
    stop_grace_period: 30s
    # DEPLOY-02: healthcheck de processo. O worker nao tem rota HTTP propria, mas o OBS-01 expoe
    # as metricas do prometheus_client em :9091 no startup (ambiente!=teste) — bater nele prova
    # que o processo arq subiu e segue vivo. start_period cobre apt-get+git clone+uv sync.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9091/metrics', timeout=3)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    deploy:
      replicas: 1
      # DEPLOY-03: worker stop-first (NAO start-first) — derruba o worker velho antes de subir
      # o novo, garantindo 1 unico consumidor ARQ no Redis. start-first deixaria 2 workers no
      # overlap -> entrega duplicada (ver memoria de workers orfaos em Swarm+ARQ).
      update_config:
        order: stop-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        order: stop-first
      restart_policy:
        condition: on-failure
    depends_on:
      - redis-barra
    networks:
      - traefik_public

  redis-barra:
    image: redis:7.0-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
      - redis-barra-data:/data
    networks:
      - traefik_public

  # OBS-02 — stack de observabilidade (Prometheus + Grafana + Alertmanager).
  # Os configs versionados vivem em infra/monitoring/ no repo; como o Swarm nao tem o
  # repo no host, cada servico clona a main no boot (mesmo padrao da api/worker) e aponta
  # o config pro caminho clonado. Scrape interno pela rede traefik_public; so o Grafana
  # publica via Traefik. NAO altera os 3 servicos acima (entrega aditiva).
  prometheus-barra:
    image: prom/prometheus:v2.53.0
    user: root
    command: >
      sh -c "apk add --no-cache git &&
      rm -rf /repo &&
      git clone --depth 1 -b main https://github.com/procexaiedu/barra.git /repo &&
      exec /bin/prometheus
      --config.file=/repo/infra/monitoring/prometheus.yml
      --storage.tsdb.path=/prometheus
      --storage.tsdb.retention.time=15d
      --web.enable-lifecycle"
    volumes:
      - prometheus-barra-data:/prometheus
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - traefik_public

  alertmanager-barra:
    image: prom/alertmanager:v0.27.0
    user: root
    environment:
      # Destino real do alerta — passo do operador (ver infra/monitoring/alertmanager.yml).
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-http://localhost:9999/noop}
    command: >
      sh -c "apk add --no-cache git &&
      rm -rf /repo &&
      git clone --depth 1 -b main https://github.com/procexaiedu/barra.git /repo &&
      exec /bin/alertmanager
      --config.file=/repo/infra/monitoring/alertmanager.yml
      --config.expand-env
      --storage.path=/alertmanager"
    volumes:
      - alertmanager-barra-data:/alertmanager
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - traefik_public

  grafana-barra:
    image: grafana/grafana:11.1.0
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=https://grafana-barra.procexai.tech
      # Datasource provisionado a partir do repo clonado (ver command).
      - GF_PATHS_PROVISIONING=/repo/infra/monitoring/grafana/provisioning
    entrypoint: >
      sh -c "apk add --no-cache git &&
      rm -rf /repo &&
      git clone --depth 1 -b main https://github.com/procexaiedu/barra.git /repo &&
      exec /run.sh"
    volumes:
      - grafana-barra-data:/var/lib/grafana
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.grafana-barra.rule=Host(`grafana-barra.procexai.tech`)"
        - "traefik.http.routers.grafana-barra.entrypoints=websecure"
        - "traefik.http.routers.grafana-barra.tls=true"
        - "traefik.http.routers.grafana-barra.tls.certresolver=le"
        - "traefik.http.services.grafana-barra.loadbalancer.server.port=3000"
        - "traefik.docker.network=traefik_public"
    depends_on:
      - prometheus-barra
    networks:
      - traefik_public

volumes:
  redis-barra-data:
  prometheus-barra-data:
  alertmanager-barra-data:
  grafana-barra-data:

networks:
  traefik_public:
    external: true
