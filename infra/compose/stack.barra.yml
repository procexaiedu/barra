# Stack Portainer — Elite Baby MVP.
# Tags pinadas: MinIO CE arquivado em 2026-04-25; Redis 8.x mantido por decisão.
# Vide docs/mvp/07-stack-tecnica.md.
#
# Este arquivo é um esqueleto. Variáveis sensíveis viram Portainer secrets.

services:
  api:
    image: ghcr.io/SEU_ORG/barra-api:latest
    restart: unless-stopped
    env_file: ../../api/.env
    depends_on:
      - redis
      - minio
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.barra.example`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=le"

  worker:
    image: ghcr.io/SEU_ORG/barra-api:latest
    restart: unless-stopped
    command: ["arq", "barra.workers.settings.WorkerSettings"]
    env_file: ../../api/.env
    depends_on:
      - redis

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_SENHA}"]
    volumes:
      - redis_data:/data
    # sem ports publicadas — só rede interna

  minio:
    # CE arquivado 2026-04-25: NUNCA usar :latest
    image: minio/minio:RELEASE.2025-12-13T05-26-58Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`s3.barra.example`)"

  evolution:
    image: atendai/evolution-api:v2.3.7
    restart: unless-stopped
    env_file: ./env/evolution.env
    volumes:
      - evolution_data:/evolution/instances
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.evolution.rule=Host(`evo.barra.example`)"

  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik_acme:/acme
    depends_on:
      - docker-socket-proxy

  docker-socket-proxy:
    # Nunca montar /var/run/docker.sock direto no Traefik (decisão 2026-04-29).
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      SERVICES: 1
      TASKS: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  redis_data:
  minio_data:
  evolution_data:
  traefik_acme:
