# CI minimo — juiz objetivo dos PRs (inclusive os gerados por agente noturno).
# Roda mypy + pytest SEM TEST_DATABASE_URL nem ANTHROPIC_API_KEY: o conftest pula os
# testes `needs_db`/`needs_key`, entao a CI nao toca o banco de producao nem a API real.
# Lint (ruff) fica fora daqui de proposito: ha divida de formatacao preexistente no repo;
# o lint dos arquivos efetivamente tocados ja e garantido pelo hook .claude/hooks/ruff_format.py.
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    # F0.1: Postgres efemero (service container) p/ os testes needs_db rodarem de
    # verdade a cada PR — FOR UPDATE + agregacao contra Postgres real, sem tocar o
    # banco de producao. postgres:15 espelha a versao do Supabase em prod (15.8).
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: barra
          POSTGRES_PASSWORD: barra
          POSTGRES_DB: barra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Aponta p/ o service container local (NAO prod). Com TEST_DATABASE_URL
      # setado, o conftest deixa de pular os needs_db. DATABASE_URL e p/ o make
      # migrate aplicar o schema; o conftest zera DATABASE_URL dentro do pytest.
      DATABASE_URL: postgresql://barra:barra@localhost:5432/barra_test
      TEST_DATABASE_URL: postgresql://barra:barra@localhost:5432/barra_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run mypy src
      # Postgres limpo nao tem o que o Supabase provê em prod (auth.users, roles,
      # publication supabase_realtime). O bootstrap stuba isso antes do schema.
      # psql ja vem no runner ubuntu-latest (postgresql-client).
      - name: bootstrap Supabase no Postgres efemero
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f ../infra/sql/ci/bootstrap_supabase.sql
      # Aplica so o SCHEMA (infra/sql/*.sql sem os *seed*) no Postgres efemero antes
      # do pytest. Os needs_db semeiam os proprios dados (rollback por teste), entao
      # os seeds descartaveis ficam de fora — CI limpo, sem o FK seed->auth.users.
      - name: aplica schema no Postgres efemero
        run: make migrate
        env:
          MIGRATE_SKIP_SEEDS: "1"
      - run: uv run pytest
      # DEPLOY-05/06: drift-check estatico das migrations (naming + sequencia
      # NNNN sem buraco). O drift repo x schema_migrations e passo do operador (runbook).
      - name: drift-check de migrations
        run: uv run python ../scripts/verificar_migrations.py

  # DEPLOY-03: builda a imagem de producao a partir de api/Dockerfile.
  # Em PR apenas valida o build (push=false). Em push para main, publica no GHCR
  # com tag sha-<commit> (imutavel, p/ rollback) + latest. O stack referencia
  # ghcr.io/procexaiedu/barra:${IMAGE_TAG:-latest} (o cutover do command e passo do operador).
  build-image:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login no GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tags e labels da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: api
          file: api/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
