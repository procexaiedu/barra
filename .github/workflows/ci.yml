# CI minimo — juiz objetivo dos PRs (inclusive os gerados por agente noturno).
# Roda mypy + pytest SEM TEST_DATABASE_URL nem ANTHROPIC_API_KEY: o conftest pula os
# testes `needs_db`/`needs_key`, entao a CI nao toca o banco de producao nem a API real.
# Lint (ruff) fica fora daqui de proposito: ha divida de formatacao preexistente no repo;
# o lint dos arquivos efetivamente tocados ja e garantido pelo hook .claude/hooks/ruff_format.py.
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run mypy src
      - run: uv run pytest

  # DEPLOY-03: builda a imagem de producao a partir de api/Dockerfile.
  # Em PR apenas valida o build (push=false). Em push para main, publica no GHCR
  # com tag sha-<commit> (imutavel, p/ rollback) + latest. O stack referencia
  # ghcr.io/procexaiedu/barra:${IMAGE_TAG:-latest} (o cutover do command e passo do operador).
  build-image:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login no GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tags e labels da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: api
          file: api/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
