# Gate de evals (EVAL-04/03) — roda o runner contra a suite de REGRESSAO com K=5.
# Arquivo SEPARADO do ci.yml de proposito: (1) o `paths` filtra a custo — so dispara quando o
# prompt/grafo/fixtures mudam (evals batem na API real e custam credito); (2) nao colide com as
# edicoes ADITIVAS de outros eixos no ci.yml. So a suite de REGRESSAO bloqueia; as adversariais
# novas sao capability (advisory) ate o operador as graduar (gate:"regressao"). Ver runner.py.
#
# PRE-REQUISITO DO OPERADOR p/ este gate de fato bloquear: adicionar os secrets
# TEST_DATABASE_URL (banco de teste, NUNCA prod) e ANTHROPIC_API_KEY no repo, e tornar o check
# "evals" obrigatorio na branch protection da main. F3.1: sem os secrets o job FALHA ALTO
# (nao pula em silencio) — um check `evals` verde so pode significar que o runner rodou.
# Como o job so dispara nos `paths` (agente/evals), PR que nao toca o agente nem o aciona.
# >>> PASSO A PASSO (provisionar o banco de teste, secrets, check obrigatorio, graduar as
# >>> adversariais de capability->regressao): infra/runbooks/evals-gate-vinculante.md
name: evals

on:
  pull_request:
    paths:
      - "api/src/barra/agente/**"
      - "api/evals/**"
      - ".github/workflows/evals.yml"
  push:
    branches: [main]
    paths:
      - "api/src/barra/agente/**"
      - "api/evals/**"

permissions:
  contents: read

concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    env:
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      # F3.1: guard FAIL-LOUD — sem os secrets o job FALHA (exit 1), nunca pula em silencio.
      # Vem antes do setup/sync p/ nao gastar minutos a toa. Um `evals` verde => runner rodou.
      - name: Exige os secrets do gate (falha alto — nunca pula em silencio)
        run: |
          faltando=""
          [ -z "$TEST_DATABASE_URL" ] && faltando="$faltando TEST_DATABASE_URL"
          [ -z "$ANTHROPIC_API_KEY" ] && faltando="$faltando ANTHROPIC_API_KEY"
          if [ -n "$faltando" ]; then
            echo "::error::Gate de evals SEM os secrets:$faltando — o gate NAO pula, FALHA p/ barrar merge. Provisione: infra/runbooks/evals-gate-vinculante.md"
            exit 1
          fi
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      # K=5: pass^k nas adversariais (regressao), >=4/5 nos canonicos. So a REGRESSAO bloqueia.
      - run: uv run python evals/runners/runner.py --k 5 --threshold 1.0
